name: yande_gui
description: "Cross-platform GUI for yande"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.9.0+36

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.9
  core:
    path: rust_builder
  flutter_rust_bridge: ^2.12.0
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  permission_handler: ^12.0.3
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  meta:
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  path_provider: ^2.1.5
  visibility_detector: ^0.4.0+2
  path: ^1.9.1
  loading_more_list: ^7.1.0
  extended_image:
    git:
      url: https://github.com/normalllll/extended_image.git
      ref: master
  flutter_easyloading: ^3.0.5
  url_launcher: ^6.3.2
  vector_math: ^2.2.0
  flutter_animate: ^4.5.2
  file_picker: ^11.0.2
  skeletonizer: ^2.1.3
  i18n: ^4.2.5

  collection: any
dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner:
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true

  assets:
    - assets/tag_translations/